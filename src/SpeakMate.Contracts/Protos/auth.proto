syntax = "proto3";

option csharp_namespace = "SpeakMate.Contracts";

package auth;

service AuthService {
  rpc Login (LoginRequest) returns (AuthResponse);
  rpc Register (RegisterRequest) returns (AuthResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
}

message AuthResponse {
  string token = 1;
  bool success = 2;
  string message = 3;
}
